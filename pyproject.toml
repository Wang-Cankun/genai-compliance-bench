[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "genai-compliance-bench"
version = "0.1.0"
description = "Compliance evaluation benchmarks for generative AI."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = ["pyyaml>=6.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/genai_compliance_bench"]
