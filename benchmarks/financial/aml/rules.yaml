rules:
  - id: AML-001
    category: aml
    severity: critical
    description: "Structuring language detected"
    keywords: ["structuring", "smurfing", "split deposit"]
    pattern: '(?i)(split|break|divide).{0,30}(transaction|deposit).{0,30}(below|under|avoid).{0,20}(\$\s*10[,.]?000|threshold)'
    regulation_ref: "BSA"
  - id: AML-002
    category: aml
    severity: high
    description: "Suspicious activity indicators"
    keywords: ["offshore account", "shell company", "money laundering", "layering"]
    regulation_ref: "BSA"
